---
# Don't forget to update deploy/charts/whereabouts/templates/daemonset.yaml as well
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whereabouts
  namespace: kube-system
  labels:
    tier: node
    app: whereabouts
spec:
  selector:
    matchLabels:
      app: whereabouts
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: whereabouts
        name: whereabouts
    spec:
      hostNetwork: true
      serviceAccount: whereabouts
      serviceAccountName: whereabouts
      containers:
        - name: whereabouts
          image: ghcr.io/k8snetworkplumbingwg/whereabouts:latest
          imagePullPolicy: Always
          command: ["/bin/sh"]
          args:
            - -c
            - |
              SLEEP=false source /install-cni.sh
              /token-watcher.sh &
              /ip-control-loop -log-level debug
          env:
            - name: NODENAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: WHEREABOUTS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 200Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
            - name: cni-net-dir
              mountPath: /host/etc/cni/net.d
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
        - name: cni-net-dir
          hostPath:
            path: /etc/cni/net.d
      tolerations:
        - operator: Exists
          effect: NoSchedule
