image:
  registry: ghcr.io
  repository: k8snetworkplumbingwg/whereabouts
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

updateStrategy: RollingUpdate
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
successfulJobsHistoryLimit: 0

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  # name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  privileged: true

resources:
  requests:
    cpu: 100m
    memory: 50Mi
  limits:
    cpu: 100m
    memory: 50Mi

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - operator: Exists
    effect: NoSchedule

affinity: {}

priorityClassName: ""

cniConf:
  confDir: /etc/cni/net.d
  binDir: /opt/cni/bin

# Default schedule is once per day at 4:30am. Users may configure this value to their liking.
cronExpression: "30 4 * * *"

reconciler:
  logLevel: debug
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 50Mi

nodeSliceController:
  enabled: false
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 50Mi
